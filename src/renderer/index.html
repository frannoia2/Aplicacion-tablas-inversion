<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Registro de inversiones</title>
        <link rel="stylesheet" href="styles.css">
        <link
            href="vendor/tabulator.min.css"
            rel="stylesheet">
    </head>
    <body>
        <!-- 🏠 HOME -->
        <div id="home" class="view">
            <h1>Perfiles</h1>

            <div class="crear-perfil">
            <input id="nombrePerfil" placeholder="Nombre del perfil">
            <button id="btnCrear">Crear perfil</button>
            </div>

            <ul id="listaPerfiles"></ul>
        </div>

        <!-- 📊 PERFIL -->
        <div id="perfil" class="view hidden">
            <h1 id="tituloPerfil">Perfil</h1>

            <button id="btnVolver">⬅ Volver</button>

            <div class="toolbar">
                <button id="btnNuevaFila">Añadir inversión</button>
                <button id="btnGuardar">Guardar</button>
            </div>
            <div id="tabla-inversiones"></div>
        </div>

        <script src="vendor/tabulator.min.js"></script>
        <script src="renderer.js"></script>
    </body>
</html>
